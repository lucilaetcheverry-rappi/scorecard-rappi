<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scorecard KPI — Compras Rappi</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0e0e0e;--bg2:#181818;--bg3:#222;--brd:#252525;--rappi:#FF441B;--rappi-dim:#3a1208;--txt:#f0f0f0;--txt2:#999;--txt3:#555;--ok:#4ade80;--ok-bg:#052e16;--warn:#fbbf24;--warn-bg:#2d1f00;--crit:#f87171;--crit-bg:#2d0a0a}
body{background:var(--bg);color:var(--txt);font-family:Arial,sans-serif;font-size:13px;min-height:100vh}
.wrap{padding:16px 18px;max-width:1200px;margin:0 auto}
.topbar{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;border-bottom:1px solid var(--brd);margin-bottom:16px;flex-wrap:wrap;gap:8px}
.logo-row{display:flex;align-items:center;gap:10px}
.rappi-badge{background:var(--rappi);color:#fff;font-size:11px;font-weight:500;padding:3px 11px;border-radius:20px}
.top-title{font-size:15px;font-weight:500}
.top-meta{font-size:11px;color:var(--txt2)}
.tabs{display:flex;gap:2px;margin-bottom:16px;background:var(--bg2);border:1px solid var(--brd);padding:3px;border-radius:10px;width:fit-content}
.tab{padding:5px 16px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;color:var(--txt2);border:none;background:transparent}
.tab.active{background:var(--rappi);color:#fff}
.section{display:none}.section.active{display:block}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(138px,1fr));gap:10px;margin-bottom:14px}
.kcard{background:var(--bg2);border:1px solid var(--brd);border-radius:10px;padding:14px 14px 12px;position:relative;overflow:hidden}
.kcard::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--brd)}
.kcard.ok::after{background:var(--ok)}.kcard.warn::after{background:var(--warn)}.kcard.crit::after{background:var(--rappi)}
.kcard-lbl{font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.kcard-val{font-size:23px;font-weight:500;line-height:1.1}
.kcard-val.ok{color:var(--ok)}.kcard-val.warn{color:var(--warn)}.kcard-val.crit{color:var(--rappi)}.kcard-val.none{color:var(--txt3);font-size:14px}
.kcard-sub{font-size:10px;color:var(--txt3);margin-top:4px}
.pill-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.pill{display:flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:11px;background:var(--bg2);border:1px solid var(--brd)}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;display:inline-block}
.d-ok{background:var(--ok)}.d-warn{background:var(--warn)}.d-crit{background:var(--rappi)}.d-none{background:var(--txt3)}
.sec-label{font-size:10px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.sec-hint{font-size:11px;color:var(--txt3);margin-bottom:10px}
.tbl-wrap{border:1px solid var(--brd);border-radius:10px;overflow:hidden;max-height:450px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
th{text-align:left;padding:8px 11px;background:var(--bg3);font-size:10px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;z-index:1;border-bottom:1px solid var(--brd)}
td{padding:7px 11px;border-bottom:1px solid var(--brd);color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap}
.b-ok{background:var(--ok-bg);color:var(--ok)}.b-warn{background:var(--warn-bg);color:var(--warn)}.b-crit{background:var(--crit-bg);color:var(--crit)}.b-none{background:var(--bg3);color:var(--txt3)}
.n-ok{color:var(--ok);font-weight:500}.n-warn{color:var(--warn);font-weight:500}.n-crit{color:var(--rappi);font-weight:500}.n-none{color:var(--txt3)}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.toolbar input,.toolbar select{background:var(--bg2);border:1px solid var(--brd);color:var(--txt);padding:6px 10px;border-radius:8px;font-size:12px;font-family:Arial,sans-serif}
.toolbar input{flex:1;min-width:160px}
.clbl{font-size:11px;color:var(--txt2)}
.acc-form{background:var(--bg2);border:1px solid var(--brd);border-radius:10px;padding:14px;display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.acc-form input,.acc-form select,.acc-form textarea{background:var(--bg3);border:1px solid var(--brd);color:var(--txt);padding:7px 10px;border-radius:8px;font-size:12px;font-family:Arial,sans-serif}
.acc-form textarea{grid-column:1/-1;resize:vertical;min-height:52px}
.btn-add{grid-column:2;background:var(--rappi);color:#fff;border:none;padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:500}
.btn-add:hover{opacity:.88}
.acc-list{display:flex;flex-direction:column;gap:6px}
.acc-item{background:var(--bg2);border:1px solid var(--brd);border-radius:10px;padding:12px;display:flex;gap:10px}
.kpi-tag{background:var(--rappi-dim);color:var(--rappi);border:1px solid var(--rappi);font-size:10px;padding:2px 8px;border-radius:20px;white-space:nowrap;height:fit-content;margin-top:1px}
.acc-body{flex:1;min-width:0}
.acc-name{font-weight:500;font-size:12px;margin-bottom:2px}
.acc-txt{font-size:12px;color:var(--txt2);margin-bottom:4px}
.acc-meta{font-size:10px;color:var(--txt3)}
.acc-side{display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0}
.acc-side select{background:var(--bg3);border:1px solid var(--brd);color:var(--txt);padding:3px 7px;border-radius:6px;font-size:11px}
.acc-del{font-size:10px;color:var(--txt3);cursor:pointer;padding:2px 7px;border-radius:4px}
.acc-del:hover{background:var(--crit-bg);color:var(--crit)}
.empty{text-align:center;padding:32px;color:var(--txt3);font-size:12px}
.id-tag{font-size:10px;color:var(--txt3);font-family:monospace}
.tgt-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;padding:10px 14px;background:var(--bg2);border:1px solid var(--brd);border-radius:10px}
.tgt-item{font-size:11px;color:var(--txt2)}.tgt-item b{color:var(--txt)}
</style>
</head>
<body>
<div class="wrap">
<div class="topbar">
  <div class="logo-row">
    <span class="rappi-badge">Rappi</span>

  </div>
  <div class="top-meta">Semana 16 · 13 abr 2026 · <span id="ts"></span></div>

<div class="tabs">

<div class="section active" id="tab-resumen">

</div>
<div class="section" id="tab-accionables">

  <div class="acc-list" id="accList"></div>
</div>

function findId(n){const up=n.toUpperCase();for(const[id,d]of Object.entries(idMap)){if(d.toUpperCase()===up)return parseInt(id);}for(const[id,d]of Object.entries(idMap)){if(up.length>4&&(d.toUpperCase().startsWith(up.slice(0,6))||up.startsWith(d.toUpperCase().slice(0,6))))return parseInt(id);}return null;}
const suppliers=swaRaw.map(([sfName,avl,swa])=>{const id=findId(sfName);return{id,name:id?idMap[id]:sfName,sfName,avl,swa,fr:id?frById[id]??null:null,doi:id?doiById[id]??null:null};});
function st(v,tgt,hi){if(v===null||v===undefined)return 'none';const n=parseFloat(v);if(hi)return n>=tgt?'ok':n>=tgt*.9?'warn':'crit';return n<=tgt?'ok':n<=tgt*1.1?'warn':'crit';}
function ov(s){const ss=[st(s.swa,T.SWA,true),st(s.avl,T.AVL,true),st(s.fr,T.FR,true),st(s.doi,T.DOI,false)].filter(x=>x!=='none');if(ss.includes('crit'))return 'crit';if(ss.includes('warn'))return 'warn';if(!ss.length)return 'none';return 'ok';}
function bdg(s){const m={ok:'b-ok',warn:'b-warn',crit:'b-crit',none:'b-none'},l={ok:'OK',warn:'Alerta',crit:'Crítico',none:'Sin datos'},d={ok:'d-ok',warn:'d-warn',crit:'d-crit',none:'d-none'};return`<span class="badge ${m[s]}"><span class="dot ${d[s]}"></span>${l[s]}</span>`;}
function nv(v,tgt,hi,d=1){if(v===null||v===undefined)return'<span class="n-none">—</span>';const s=st(v,tgt,hi);return`<span class="n-${s}">${parseFloat(v).toFixed(d)}</span>`;}
function renderCards(){const av=a=>a.filter(v=>v!==null).reduce((x,y)=>x+y,0)/(a.filter(v=>v!==null).length||1);const kpis=[{l:'SWA',v:av(suppliers.map(s=>s.swa)),t:T.SWA,hi:true,s:'%',src:'Snowflake W16'},{l:'AVL',v:av(suppliers.map(s=>s.avl)),t:T.AVL,hi:true,s:'%',src:'Snowflake W16'},{l:'FR',v:av(suppliers.filter(s=>s.fr!==null).map(s=>s.fr)),t:T.FR,hi:true,s:'%',src:'Snowflake'},{l:'DOI',v:av(suppliers.filter(s=>s.doi!==null).map(s=>s.doi)),t:T.DOI,hi:false,s:' días',src:'Excel'}];
document.getElementById('kpiCards').innerHTML=kpis.map(k=>{const s=st(k.v,k.t,k.hi);return`<div class="kcard ${s==='none'?'':s}"><div class="kcard-lbl">${k.l}</div><div class="kcard-val ${s==='none'?'none':s}">${k.v!==null?k.v.toFixed(1)+k.s:'—'}</div><div class="kcard-sub">Target: ${k.t}${k.s} · ${k.src}</div></div>`;}).join('');
const c={ok:0,warn:0,crit:0};suppliers.forEach(s=>{const o=ov(s);if(c[o]!==undefined)c[o]++;});
document.getElementById('pillRow').innerHTML=`<div class="pill"><span class="dot d-ok"></span><span style="color:var(--ok)">${c.ok} OK</span></div><div class="pill"><span class="dot d-warn"></span><span style="color:var(--warn)">${c.warn} alerta</span></div><div class="pill"><span class="dot d-crit"></span><span style="color:var(--rappi)">${c.crit} críticos</span></div><div class="pill" style="color:var(--txt2)">${suppliers.length} proveedores</div>`;}
function renderCrit(){const rows=suppliers.filter(s=>st(s.swa,T.SWA,true)!=='ok'||st(s.avl,T.AVL,true)!=='ok').sort((a,b)=>{const w={crit:0,warn:1,ok:2,none:3};return w[ov(a)]-w[ov(b)];});document.getElementById('critBody').innerHTML=rows.map(s=>`<tr><td><span class="id-tag">${s.id??'—'}</span></td><td title="${s.sfName}">${s.name}</td><td>${nv(s.swa,T.SWA,true)}</td><td>${nv(s.avl,T.AVL,true)}</td><td>${nv(s.fr,T.FR,true)}</td><td>${nv(s.doi,T.DOI,false,1)}</td><td>${bdg(ov(s))}</td></tr>`).join('');}
let rows=[];
function buildRows(){rows=suppliers.map(s=>({s,o:ov(s)}));filt();}
function filt(){const q=document.getElementById('srch').value.toLowerCase(),f=document.getElementById('fst').value,filtered=rows.filter(({s,o})=>(!q||s.name.toLowerCase().includes(q)||(s.id&&String(s.id).includes(q)))&&(!f||o===f));document.getElementById('clbl').textContent=`${filtered.length} de ${suppliers.length}`;document.getElementById('mainBody').innerHTML=filtered.map(({s,o})=>`<tr><td><span class="id-tag">${s.id??'—'}</span></td><td title="${s.sfName}"><span class="dot d-${o}" style="margin-right:5px"></span>${s.name}</td><td>${nv(s.swa,T.SWA,true)}</td><td>${nv(s.avl,T.AVL,true)}</td><td>${nv(s.fr,T.FR,true)}</td><td>${nv(s.doi,T.DOI,false,1)}</td><td>${bdg(o)}</td></tr>`).join('');}
let accs=JSON.parse(localStorage.getItem('rappi_accs')||'[]');
function saveAcc(){localStorage.setItem('rappi_accs',JSON.stringify(accs));}
function addAcc(){const p=document.getElementById('aP').value.trim(),t=document.getElementById('aT').value.trim();if(!p||!t)return;accs.unshift({id:Date.now(),prov:p,kpi:document.getElementById('aK').value,buyer:document.getElementById('aB').value.trim(),fecha:document.getElementById('aF').value,texto:t,estado:document.getElementById('aE').value});['aP','aB','aT','aF'].forEach(i=>document.getElementById(i).value='');document.getElementById('aK').value='';saveAcc();renderAcc();}
const eL={pendiente:'Pendiente',progreso:'En progreso',cumplido:'Cumplido',vencido:'Vencido'};
function renderAcc(){const el=document.getElementById('accList');if(!accs.length){el.innerHTML='<div class="empty">Sin accionables. Agregá uno con el formulario.</div>';return;}el.innerHTML=accs.map(a=>`<div class="acc-item">${a.kpi?`<div class="kpi-tag">${a.kpi}</div>`:''}<div class="acc-body"><div class="acc-name">${a.prov}</div><div class="acc-txt">${a.texto}</div><div class="acc-meta">${[a.buyer?'Buyer: '+a.buyer:'',a.fecha?'Límite: '+a.fecha:''].filter(Boolean).join(' · ')}</div></div><div class="acc-side"><select onchange="chE(${a.id},this.value)">${Object.entries(eL).map(([v,l])=>`<option value="${v}" ${a.estado===v?'selected':''}>${l}</option>`).join('')}</select><span class="acc-del" onclick="delA(${a.id})">Eliminar</span></div></div>`).join('');}
function chE(id,v){const a=accs.find(x=>x.id===id);if(a){a.estado=v;saveAcc();renderAcc();}}
function delA(id){accs=accs.filter(x=>x.id!==id);saveAcc();renderAcc();}
function sw(name){document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['resumen','proveedores','accionables'][i]===name));document.querySelectorAll('.section').forEach(s=>s.classList.toggle('active',s.id==='tab-'+name));}
document.getElementById('supList').innerHTML=suppliers.map(s=>`<option value="${s.name}">`).join('');
document.getElementById('ts').textContent=new Date().toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
renderCards();renderCrit();buildRows();renderAcc();
